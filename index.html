<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acil İlaç Kartı 2025</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c25;
    --bg3: #1e2433;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #9ba3b8;
    --text3: #5c647a;
    --accent: #2dd4aa;
    --accent-dim: rgba(45,212,170,0.12);
    --red: #ff6b6b; --red-bg: rgba(255,107,107,0.12);
    --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.12);
    --amber: #fbbf24; --amber-bg: rgba(251,191,36,0.12);
    --purple: #a78bfa; --purple-bg: rgba(167,139,250,0.12);
    --teal: #2dd4aa; --teal-bg: rgba(45,212,170,0.12);
    --gray-bg: rgba(255,255,255,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'IBM Plex Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  body { display: flex; flex-direction: column; }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    flex-shrink: 0;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-brand .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent-dim); border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 16px;
  }
  .header-brand h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-brand p { font-size: 11px; color: var(--text3); margin-top: 1px; font-family: 'IBM Plex Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .search-wrap { position: relative; }
  .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text3); pointer-events: none; }
  .search-wrap input {
    padding: 7px 12px 7px 32px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    width: 200px;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }

  .layout { display: flex; flex: 1; overflow: hidden; }

  nav {
    width: 210px;
    min-width: 210px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 12px 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .nav-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 6px 16px 8px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .12s;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .nav-item i { font-size: 16px; min-width: 18px; }
  .nav-count {
    margin-left: auto;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg3);
    color: var(--text3);
    border-radius: 10px;
    padding: 2px 7px;
  }
  .nav-item.active .nav-count { background: var(--accent-dim); color: var(--accent); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .content-header {
    padding: 16px 24px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .content-header h2 { font-size: 16px; font-weight: 600; color: var(--text); }
  .content-header p { font-size: 12px; color: var(--text3); margin-top: 3px; }

  .content-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'IBM Plex Mono', monospace;
    padding: 8px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    position: sticky;
    top: -20px;
    z-index: 1;
  }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.5;
  }
  tbody tr:hover td { background: var(--bg2); }
  tbody tr:last-child td { border-bottom: none; }

  .drug-name { font-weight: 500; color: var(--text); font-size: 13px; }
  .dose-text { color: var(--text2); font-size: 12px; line-height: 1.6; }
  .dose-line { display: block; }
  .dose-line + .dose-line { margin-top: 2px; }
  .route-cell { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
  .time-cell { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
  .endik-cell { font-size: 11px; color: var(--text2); }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
  }
  .b-red    { background: var(--red-bg);    color: var(--red); }
  .b-blue   { background: var(--blue-bg);   color: var(--blue); }
  .b-amber  { background: var(--amber-bg);  color: var(--amber); }
  .b-purple { background: var(--purple-bg); color: var(--purple); }
  .b-teal   { background: var(--teal-bg);   color: var(--teal); }
  .b-gray   { background: var(--gray-bg);   color: var(--text2); }

  .sub-head {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .1em;
    font-family: 'IBM Plex Mono', monospace;
    padding: 10px 12px 6px;
    background: var(--accent-dim);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state i { font-size: 32px; display: block; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; }

  mark { background: rgba(251,191,36,0.2); color: var(--amber); border-radius: 3px; padding: 0 2px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  @media (max-width: 680px) {
    nav { display: none; }
    .header-right .search-wrap input { width: 150px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="logo-icon"><i class="ti ti-heart-rate-monitor"></i></div>
    <div>
      <h1>Acil İlaç Kartı</h1>
      <p>2025 · GK / MAA</p>
    </div>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="İlaç veya endikasyon ara..." oninput="doSearch(this.value)"/>
    </div>
  </div>
</header>

<div class="layout">
  <nav id="nav"></nav>
  <main>
    <div class="content-header">
      <h2 id="ch-title"></h2>
      <p id="ch-sub"></p>
    </div>
    <div class="content-scroll" id="content"></div>
  </main>
</div>

<script>
const TABS = [
  {
    id: 0, icon: "ti-heart-rate-monitor",
    title: "Resüsitasyon İlaçları",
    sub: "Kardiyak arrest, antiaritmikler ve hemodinamik destek",
    cols: ["İlaç", "Doz", "Yol"],
    rows: [
      { name:"Adrenalin", b:"b-red", doses:["Arrest: 1 mg IV puşe","Anafilaksi: 0,3–0,5 mg IM"], route:"IV / IM" },
      { name:"Amiodaron", b:"b-red", doses:["Arrest nVT/VF: 300 mg → 150 mg IV","Nabızlı VT: 150 mg/10 dk + 1 mg/dk (ilk 6 saat)"], route:"IV" },
      { name:"Lidokain", b:"b-red", doses:["Arrest nVT/VF: 1–1,5 mg/kg IV","2. doz: yarısı"], route:"IV" },
      { name:"Adenozin", b:"b-blue", doses:["6 mg IV hızlı bolus → 12 mg IV tekrar"], route:"IV hızlı" },
      { name:"Dopamin", b:"b-teal", doses:["2–20 mcg/kg/dk IV inf"], route:"IV inf" },
      { name:"Dobutamin", b:"b-teal", doses:["2–20 mcg/kg/dk IV inf"], route:"IV inf" },
      { name:"Noradrenalin", b:"b-teal", doses:["5–40 mcg/dk IV inf"], route:"IV inf" },
      { name:"Esmolol", b:"b-blue", doses:["Yükleme: 500 mcg/kg IV (>1 dk)","İdame: 50 mcg/kg/dk IV"], route:"IV" },
      { name:"Diltiazem", b:"b-blue", doses:["0,25 mg/kg IV (>2 dk)"], route:"IV" },
      { name:"Verapamil", b:"b-blue", doses:["2,5–5 mg IV (>2 dk)"], route:"IV" },
      { name:"Digoksin", b:"b-blue", doses:["8–12 mcg/kg IV (>2 dk)"], route:"IV" },
      { name:"Metoprolol", b:"b-blue", doses:["2,5–5 mg IV (>2 dk), maks 15 mg"], route:"IV" },
      { name:"Nitrogliserin", b:"b-amber", doses:["5–100 mcg/dk IV"], route:"IV inf" },
      { name:"Nikardipin", b:"b-amber", doses:["3–5 mg/saat, 15 dk'da bir 1 mg artır","Maks: 15 mg/saat"], route:"IV inf" },
      { name:"NaHCO₃", b:"b-gray", doses:["1 mEq/kg IV"], route:"IV" },
      { name:"MgSO₄", b:"b-gray", doses:["TdP nabızlı/periarrest: 2 gr IV yavaş (>10 dk)","TdP → nVT/VF: 1–2 gr IV/IO bolus"], route:"IV / IO" },
      { name:"Aspirin", b:"b-amber", doses:["AKS: 300 mg PO"], route:"PO" },
      { name:"Klopidogrel", b:"b-amber", doses:["AKS: 300–600 mg PO yükleme"], route:"PO" },
      { name:"Tikagrelor", b:"b-amber", doses:["AKS: 180 mg PO"], route:"PO" },
      { name:"Heparin", b:"b-amber", doses:["AKS: 60 IU/kg IV, maks 4000 IU"], route:"IV" },
      { name:"Traneksamik Asit", b:"b-red", doses:["Multitravma: 1 gr/10 dk → 1 gr/8 saat"], route:"IV" },
    ]
  },
  {
    id: 1, icon: "ti-needle",
    title: "Hızlı Seri Ardışık Entübasyon",
    sub: "Ön tedavi, sedatifler (etki başlangıcı / süresi) ve paralizanlar",
    cols: ["İlaç", "Doz", "Etki Başlangıcı", "Süre"],
    sections: [
      { label: "Ön Tedavi — Hipotansiyon", rows: [
        { name:"Adrenalin (push-dose)", b:"b-red", dose:"5–20 mcg IV, 30 sn'de — her 2-5 dk'da tekrar", onset:"", dur:"" },
        { name:"Noradrenalin", b:"b-teal", dose:"5–40 mcg/dk IV inf", onset:"", dur:"" },
      ]},
      { label: "Sedatifler", rows: [
        { name:"Etomidat", b:"b-purple", dose:"0,3–0,5 mg/kg IV", onset:"< 1 dk", dur:"10–20 dk" },
        { name:"Propofol", b:"b-purple", dose:"0,5–1,5 mg/kg IV", onset:"20–40 sn", dur:"8–15 dk" },
        { name:"Ketamin", b:"b-purple", dose:"1–2 mg/kg IV", onset:"1 dk", dur:"10–20 dk" },
        { name:"Midazolam", b:"b-purple", dose:"0,1–0,3 mg/kg IV", onset:"1 dk", dur:"60–90 dk" },
        { name:"Thiopental", b:"b-purple", dose:"3–5 mg/kg IV", onset:"1 dk", dur:"5–10 dk" },
      ]},
      { label: "Paralizanlar", rows: [
        { name:"Roküronyum", b:"b-teal", dose:"1 mg/kg IV", onset:"1–3 dk", dur:"30–45 dk" },
        { name:"Süksinilkolin", b:"b-teal", dose:"1,5 mg/kg IV", onset:"45–60 sn", dur:"5–9 dk" },
        { name:"Veküronyum", b:"b-teal", dose:"0,1 mg/kg IV", onset:"2–3 dk", dur:"25–40 dk" },
      ]},
    ]
  },
  {
    id: 2, icon: "ti-brain",
    title: "Antikonvülzanlar",
    sub: "Status epileptikus ve aktif nöbet tedavisi",
    cols: ["İlaç", "Doz", "Yol"],
    rows: [
      { name:"Fenitoin", b:"b-amber", doses:["20 mg/kg IV (50 mg/dk hızında)"], route:"IV" },
      { name:"Levetirasetam", b:"b-teal", doses:["60 mg/kg IV, maks 4500 mg, >5 dk"], route:"IV" },
      { name:"Diazepam", b:"b-blue", doses:["0,15 mg/kg IV, tek dozda maks 10 mg"], route:"IV" },
      { name:"Midazolam", b:"b-blue", doses:["Refrakter SE: 0,2 mg/kg IV yükleme","İdame: 0,1–0,5 mg/kg/saat IV"], route:"IV" },
    ]
  },
  {
    id: 3, icon: "ti-mood-calm",
    title: "Ajitasyon Tedavisi",
    sub: "Akut psikomotor ajitasyon yönetimi",
    cols: ["İlaç", "Doz", "Yol"],
    rows: [
      { name:"Olanzapin", b:"b-purple", doses:["5–10 mg PO / 10 mg IM"], route:"PO / IM" },
      { name:"Haloperidol", b:"b-purple", doses:["5 mg IM"], route:"IM" },
      { name:"Lorazepam", b:"b-blue", doses:["1–2 mg PO"], route:"PO" },
    ]
  },
  {
    id: 4, icon: "ti-pill",
    title: "Antidotlar ve Endikasyonları",
    sub: "Zehirlenme ve aşırı doz tedavisinde spesifik antidotlar",
    cols: ["Antidot", "Doz", "Endikasyon"],
    rows: [
      { name:"Naloksan", b:"b-red", doses:["Spontan soluyorsa: 0,4 mg IV","Apneik/siyanotik: maks 2 mg IV"], endik:"Opioid, Klonidin" },
      { name:"Flumazenil", b:"b-blue", doses:["0,2 mg IV (>1 dk), maks 1 mg"], endik:"Benzodiazepin" },
      { name:"Kalsiyum klorür", b:"b-amber", doses:["%10'luk 10 mL IV >10 dk","Tekrar: 20 dk'da bir, 4 kez"], endik:"KKB, Beta bloker" },
      { name:"Kalsiyum glukonat", b:"b-amber", doses:["%10'luk 30 mL IV >10 dk","Tekrar: 20 dk'da bir, 4 kez"], endik:"KKB, Beta bloker" },
      { name:"Difenhidramin / Biperiden", b:"b-gray", doses:["Difenhidramin: 50 mg IV","Biperiden: 2,5–5 mg IV/IM"], endik:"Distoni" },
      { name:"Glukagon", b:"b-amber", doses:["5 mg IV bolus, maks 10 mg"], endik:"Beta bloker, KKB" },
      { name:"Sodyum bikarbonat", b:"b-gray", doses:["1–2 mEq/kg IV"], endik:"TCA, Salisilat" },
      { name:"Fizostigmin", b:"b-gray", doses:["0,5–2 mg IV (0,02 mg/kg) >5 dk"], endik:"Antikolinerjik" },
      { name:"Atropin", b:"b-teal", doses:["1 mg IV/IM/IO (tekrar)"], endik:"Organofosfat" },
      { name:"Pralidoksim", b:"b-teal", doses:["30 mg/kg IV bolus >20 dk","10 mg/kg/saat infüzyon"], endik:"Organofosfat" },
      { name:"Digoksin Fab", b:"b-blue", doses:["Vial sayısı = serum kons. (ng/mL) × kg / 100"], endik:"Digoksin" },
      { name:"Etanol %10 IV", b:"b-gray", doses:["Yükleme: 10 mL/kg IV","İdame: 1 mL/kg/saat (HD varsa 2×)","Hedef: serum etanol 100 mg/dL"], endik:"Metanol" },
      { name:"Metilen mavisi", b:"b-blue", doses:["1 mg/kg IV >5 dk"], endik:"Oksitleyici toksinler" },
      { name:"Asetilsistein (NAC)", b:"b-teal", doses:["200 mg/kg IV / 4 saat inf","100 mg/kg / 16 saat inf (2 basamaklı)"], endik:"Asetaminofen" },
      { name:"Sugammadeks", b:"b-teal", doses:["2–4 mg/kg IV"], endik:"Roküronyum / Veküronyum" },
      { name:"Lipid emülsiyonu %20", b:"b-gray", doses:["Bolus: 1,5 mL/kg IV","İnf: 0,25 mL/kg/dk × 30–60 dk","Maks: 12 mL/kg"], endik:"Lokal anestezikler, lipid-çözünür ilaçlar" },
      { name:"Protamin sülfat", b:"b-gray", doses:["1 mg = 100 IÜ Heparin","1 mg = 1 mg Enoksaparin","Uygulama >10 dk, maks 50 mg"], endik:"Heparin, Enoksaparin" },
    ]
  }
];

let activeTab = 0;
let q = '';

function rowCount(tab) {
  if (tab.rows) return tab.rows.length;
  return tab.sections.reduce((s, sec) => s + sec.rows.length, 0);
}

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '<div class="nav-label">Kategoriler</div>' + TABS.map(t =>
    `<div class="nav-item${t.id===0?' active':''}" onclick="setTab(${t.id},this)">
      <i class="ti ${t.icon}"></i><span>${t.title}</span>
      <span class="nav-count">${rowCount(t)}</span>
    </div>`
  ).join('');
}

function setTab(i, el) {
  activeTab = i; q = '';
  document.getElementById('search').value = '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}

function doSearch(v) { q = v.toLowerCase(); render(); }

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hl(text) {
  if (!q) return esc(text);
  const safe = esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function match(r) {
  if (!q) return true;
  const hay = [r.name, ...(r.doses||[]), r.dose||'', r.endik||'', r.route||''].join(' ').toLowerCase();
  return hay.includes(q);
}

function render() {
  const tab = TABS[activeTab];
  document.getElementById('ch-title').textContent = tab.title;
  document.getElementById('ch-sub').textContent = tab.sub;

  const area = document.getElementById('content');
  const isRSI = tab.sections !== undefined;
  const isAntidot = activeTab === 4;

  let html = '';

  if (isRSI) {
    let any = false;
    html = `<table><thead><tr>${tab.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
    tab.sections.forEach(sec => {
      const vis = sec.rows.filter(match);
      if (!vis.length) return;
      any = true;
      html += `<tr><td colspan="4" class="sub-head">${sec.label}</td></tr>`;
      vis.forEach(r => {
        html += `<tr>
          <td><span class="badge ${r.b}">${hl(r.name)}</span></td>
          <td class="dose-text">${hl(r.dose)}</td>
          <td class="time-cell">${r.onset}</td>
          <td class="time-cell">${r.dur}</td>
        </tr>`;
      });
    });
    html += '</tbody></table>';
    if (!any) html = emptyState();
  } else {
    const vis = (tab.rows||[]).filter(match);
    if (!vis.length) { area.innerHTML = emptyState(); return; }
    html = `<table><thead><tr>${tab.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
    vis.forEach(r => {
      const doseHtml = (r.doses||[]).map(d => `<span class="dose-line">${hl(d)}</span>`).join('');
      if (isAntidot) {
        html += `<tr>
          <td><span class="badge ${r.b}">${hl(r.name)}</span></td>
          <td class="dose-text">${doseHtml}</td>
          <td class="endik-cell">${hl(r.endik||'')}</td>
        </tr>`;
      } else {
        html += `<tr>
          <td><span class="drug-name">${hl(r.name)}</span><br><span class="badge ${r.b}" style="margin-top:3px;display:inline-block">${r.b.replace('b-','')}</span></td>
          <td class="dose-text">${doseHtml}</td>
          <td class="route-cell">${r.route||''}</td>
        </tr>`;
      }
    });
    html += '</tbody></table>';
  }

  area.innerHTML = html;
}

function emptyState() {
  return `<div class="empty-state"><i class="ti ti-search"></i><p>"${esc(q)}" için sonuç bulunamadı.</p></div>`;
}

buildNav();
render();
</script>
</body>
</html>
